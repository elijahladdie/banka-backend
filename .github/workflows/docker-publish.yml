name: Build, Test, and Publish Docker Image

on:
	push:
		branches:
			- develop
	pull_request:

permissions:
	contents: read
	packages: write

jobs:
	smoke-test:
		runs-on: ubuntu-latest

		services:
			postgres:
				image: postgres:16
				env:
					POSTGRES_USER: banka
					POSTGRES_PASSWORD: banka
					POSTGRES_DB: banka
				ports:
					- 5432:5432
				options: >-
					--health-cmd="pg_isready -U banka -d banka"
					--health-interval=10s
					--health-timeout=5s
					--health-retries=5

		steps:
			- name: Checkout
				uses: actions/checkout@v4

			- name: Build Docker image
				run: docker build -t banka-backend:ci .

			- name: Start container and verify health
				run: |
					set -e

					docker run -d --name banka-backend-ci --network host \
						-e PORT=5000 \
						-e NODE_ENV=production \
						-e DATABASE_URL=postgresql://banka:banka@127.0.0.1:5432/banka \
						-e JWT_SECRET=ci-secret \
						-e JWT_EXPIRES_IN=1d \
						-e COOKIE_NAME=banka_token \
						-e COOKIE_SECURE=false \
						-e FRONTEND_URL=http://localhost:3000 \
						-e REDIS_URL=redis://127.0.0.1:6379 \
						-e SMTP_HOST=localhost \
						-e SMTP_PORT=587 \
						-e SMTP_USER=test \
						-e SMTP_PASS=test \
						-e SMTP_FROM=no-reply@banka.local \
						banka-backend:ci

					for i in $(seq 1 30); do
						if curl -fsS http://127.0.0.1:5000/health >/dev/null; then
							echo "Health check passed"
							exit 0
						fi
						sleep 2
					done

					echo "Health check failed"
					docker logs banka-backend-ci
					exit 1

			- name: Show container logs on failure
				if: failure()
				run: docker logs banka-backend-ci || true

			- name: Cleanup test container
				if: always()
				run: docker rm -f banka-backend-ci || true

	publish:
		runs-on: ubuntu-latest
		needs: smoke-test
		if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

		steps:
			- name: Checkout
				uses: actions/checkout@v4

			- name: Set up Docker Buildx
				uses: docker/setup-buildx-action@v3

			- name: Log in to GHCR
				uses: docker/login-action@v3
				with:
					registry: ghcr.io
					username: ${{ github.actor }}
					password: ${{ secrets.GITHUB_TOKEN }}

			- name: Extract Docker metadata
				id: meta
				uses: docker/metadata-action@v5
				with:
					images: ghcr.io/${{ github.repository }}
					tags: |
						type=raw,value=latest
						type=sha

			- name: Build and push Docker image
				uses: docker/build-push-action@v6
				with:
					context: .
					file: ./Dockerfile
					push: true
					tags: ${{ steps.meta.outputs.tags }}
					labels: ${{ steps.meta.outputs.labels }}
					cache-from: type=gha
					cache-to: type=gha,mode=max
